<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wisdom Quiz</title>
    <link rel="manifest" href="data:application/manifest+json,{\"name\":\"Wisdom Quiz\",\"short_name\":\"WisdomQuiz\",\"description\":\"50 Questions | 60 Seconds | 50-50 Joker\",\"start_url\":\"/\",\"display\":\"standalone\",\"background_color\":\"#1e1b4b\",\"theme_color\":\"#7c3aed\",\"icons\":[{\"src\":\"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%237c3aed'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white' font-weight='bold'%3EWQ%3C/text%3E%3C/svg%3E\",\"sizes\":\"any\",\"type\":\"image/svg+xml\"}]}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 800px;
            width: 100%;
            position: relative;
        }

        /* ========== İKONLAR ========== */
        
        /* Kupa İkonu */
        .icon-trophy {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            position: relative;
        }
        .icon-trophy .cup-body {
            position: absolute;
            width: 38px;
            height: 32px;
            background: linear-gradient(145deg, #fbbf24, #f59e0b);
            top: 12px;
            left: 16px;
            border-radius: 0 0 35% 35%;
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.4);
        }
        .icon-trophy .cup-body::before {
            content: '';
            position: absolute;
            width: 24px;
            height: 6px;
            background: #fbbf24;
            top: -5px;
            left: 7px;
            border-radius: 20px 20px 0 0;
        }
        .icon-trophy .cup-handle {
            position: absolute;
            width: 10px;
            height: 18px;
            border: 2px solid #f59e0b;
            border-left: none;
            border-radius: 0 15px 15px 0;
            top: 20px;
            right: 12px;
        }
        .icon-trophy .cup-base {
            position: absolute;
            width: 30px;
            height: 5px;
            background: linear-gradient(145deg, #fbbf24, #d97706);
            bottom: 8px;
            left: 20px;
            border-radius: 3px;
        }
        .icon-trophy .star {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fef08a;
            top: 22px;
            left: 31px;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        /* Müzik İkonu */
        .icon-music {
            width: 24px;
            height: 24px;
            display: inline-block;
            position: relative;
        }
        .icon-music .note {
            position: absolute;
            width: 4px;
            height: 12px;
            background: white;
            left: 4px;
            top: 4px;
            border-radius: 2px;
            box-shadow: 8px 0 0 white, 16px 0 0 white;
        }
        .icon-music .note::before {
            content: '';
            position: absolute;
            width: 8px;
            height: 6px;
            background: white;
            border-radius: 0 0 50% 50%;
            left: -2px;
            top: 10px;
        }
        .icon-music .note2 {
            position: absolute;
            width: 4px;
            height: 10px;
            background: white;
            left: 12px;
            top: 6px;
            border-radius: 2px;
        }
        .icon-music .note2::before {
            content: '';
            position: absolute;
            width: 7px;
            height: 5px;
            background: white;
            border-radius: 0 0 50% 50%;
            left: -1px;
            top: 8px;
        }

        /* Paylaş İkonu */
        .icon-share {
            width: 20px;
            height: 20px;
            display: inline-block;
            position: relative;
        }
        .icon-share .line {
            position: absolute;
            width: 12px;
            height: 2px;
            background: white;
            top: 9px;
            left: 2px;
            border-radius: 1px;
        }
        .icon-share .line::before {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border-right: 2px solid white;
            border-top: 2px solid white;
            transform: rotate(45deg);
            left: 4px;
            top: -8px;
        }
        .icon-share .line::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border-right: 2px solid white;
            border-bottom: 2px solid white;
            transform: rotate(-45deg);
            left: 4px;
            top: 2px;
        }
        .icon-share .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            left: 14px;
            top: 0;
            box-shadow: 0 8px 0 white;
        }

        /* Ayarlar Dişli İkonu */
        .icon-settings {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .icon-settings svg {
            width: 100%;
            height: 100%;
            stroke: white;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Dil İkonu (Dünya + Konuşma Balonu) */
        .icon-language {
            width: 26px;
            height: 26px;
            display: inline-block;
            position: relative;
        }
        .icon-language .globe {
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-radius: 50%;
            top: 4px;
            left: 4px;
        }
        .icon-language .globe-line {
            position: absolute;
            width: 10px;
            height: 2px;
            background: white;
            top: 12px;
            left: 8px;
        }
        .icon-language .globe-line2 {
            position: absolute;
            width: 2px;
            height: 10px;
            background: white;
            top: 8px;
            left: 12px;
        }
        .icon-language .bubble {
            position: absolute;
            width: 10px;
            height: 8px;
            background: white;
            border-radius: 40%;
            bottom: 2px;
            right: 2px;
        }
        .icon-language .bubble::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #312e81;
            border-radius: 50%;
            bottom: 1px;
            right: 1px;
        }

        /* Titreşim İkonu */
        .icon-vibrate {
            width: 26px;
            height: 24px;
            display: inline-block;
            position: relative;
        }
        .icon-vibrate .bar {
            position: absolute;
            width: 3px;
            background: white;
            border-radius: 2px;
            bottom: 4px;
        }
        .icon-vibrate .bar-1 { height: 12px; left: 2px; }
        .icon-vibrate .bar-2 { height: 20px; left: 7px; }
        .icon-vibrate .bar-3 { height: 16px; left: 12px; }
        .icon-vibrate .bar-4 { height: 8px; left: 17px; }
        .icon-vibrate .bar-5 { height: 10px; left: 22px; }
        .icon-vibrate .wave {
            position: absolute;
            width: 2px;
            height: 4px;
            background: rgba(255,255,255,0.5);
            border-radius: 1px;
        }
        .icon-vibrate .w1 { left: 4px; top: 2px; }
        .icon-vibrate .w2 { left: 9px; top: 0px; }
        .icon-vibrate .w3 { left: 14px; top: 1px; }

        /* Ses İkonu */
        .icon-sound {
            width: 26px;
            height: 24px;
            display: inline-block;
            position: relative;
        }
        .icon-sound .speaker {
            position: absolute;
            width: 12px;
            height: 14px;
            background: white;
            left: 2px;
            top: 5px;
            clip-path: polygon(0% 25%, 30% 25%, 55% 0%, 55% 100%, 30% 75%, 0% 75%);
        }
        .icon-sound .wave {
            position: absolute;
            width: 2px;
            background: white;
            border-radius: 1px;
            top: 7px;
        }
        .icon-sound .wave-1 { height: 8px; left: 16px; }
        .icon-sound .wave-2 { height: 12px; left: 19px; top: 6px; }
        .icon-sound .wave-3 { height: 6px; left: 22px; top: 9px; }
        .icon-sound .dot {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            left: 14px;
            top: 3px;
        }

        /* Doğru İkonu */
        .icon-check {
            width: 32px;
            height: 32px;
            display: inline-block;
            position: relative;
            background: linear-gradient(145deg, #059669, #10b981);
            border-radius: 50%;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        .icon-check::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 14px;
            border-right: 3px solid white;
            border-bottom: 3px solid white;
            transform: rotate(45deg);
            left: 11px;
            top: 7px;
        }

        /* Yanlış İkonu */
        .icon-cross {
            width: 32px;
            height: 32px;
            display: inline-block;
            position: relative;
            background: linear-gradient(145deg, #dc2626, #ef4444);
            border-radius: 50%;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }
        .icon-cross::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 3px;
            background: white;
            top: 14px;
            left: 8px;
            transform: rotate(45deg);
            border-radius: 2px;
        }
        .icon-cross::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 3px;
            background: white;
            top: 14px;
            left: 8px;
            transform: rotate(-45deg);
            border-radius: 2px;
        }

        /* Oynat İkonu */
        .icon-play {
            width: 20px;
            height: 20px;
            display: inline-block;
            position: relative;
        }
        .icon-play .triangle {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 12px solid white;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            left: 2px;
            top: 2px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        /* Zamanlayıcı İkonu */
        .icon-timer {
            width: 24px;
            height: 24px;
            display: inline-block;
            position: relative;
        }
        .icon-timer .circle {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
        }
        .icon-timer .hand {
            position: absolute;
            width: 8px;
            height: 2px;
            background: white;
            top: 12px;
            left: 12px;
            transform-origin: left center;
            border-radius: 2px;
            animation: timerTick 1s linear infinite;
        }
        .icon-timer .dot {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            top: 10px;
            left: 10px;
        }
        @keyframes timerTick {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Joker İkonu */
        .icon-joker {
            width: 26px;
            height: 26px;
            display: inline-block;
            position: relative;
        }
        .icon-joker .circle-outer {
            position: absolute;
            width: 22px;
            height: 22px;
            border: 2px solid white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
        }
        .icon-joker .text {
            position: absolute;
            font-size: 11px;
            font-weight: 800;
            color: white;
            top: 6px;
            left: 7px;
        }
        .icon-joker .divider {
            position: absolute;
            width: 16px;
            height: 2px;
            background: white;
            top: 12px;
            left: 5px;
            border-radius: 1px;
        }

        /* ========== MENU ========== */
        .menu-screen {
            background: linear-gradient(145deg, #1e1b4b 0%, #312e81 100%);
            border: 4px solid #7c3aed;
            border-radius: 25px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
        }

        .menu-title {
            color: #a78bfa;
            font-size: 38px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
        }

        .menu-subtitle {
            color: #e9d5ff;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .menu-btn {
            background: linear-gradient(145deg, #7c3aed 0%, #6d28d9 100%);
            border: none;
            border-radius: 15px;
            padding: 14px 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .menu-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.5);
        }

        /* Paylaş Butonu (özel renk) */
        .share-btn {
            background: linear-gradient(145deg, #fbbf24, #f59e0b);
            border: none;
            border-radius: 15px;
            padding: 12px 20px;
            color: #1e1b4b;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            width: 100%;
        }

        .share-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(251, 191, 36, 0.5);
        }

        /* ========== AYARLAR ========== */
        .settings-panel {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            display: none;
        }

        .settings-panel.show {
            display: block;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .setting-label {
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lang-selector {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 4px;
            border-radius: 40px;
        }

        .lang-option {
            padding: 5px 15px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            font-size: 14px;
            transition: 0.2s;
        }

        .lang-option.active {
            background: #7c3aed;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.4);
        }

        .toggle-switch {
            width: 50px;
            height: 26px;
            background: #4b5563;
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-switch.active {
            background: #7c3aed;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 3px;
            transition: 0.3s;
        }

        .toggle-switch.active::after {
            left: 25px;
        }

        /* ========== OYUN ALANI ========== */
        .score-board {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 3px solid #7c3aed;
            border-radius: 20px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            height: 80px;
            min-height: 80px;
            max-height: 80px;
            overflow: hidden;
        }

        .score-item {
            text-align: center;
            flex: 1;
            min-width: 0;
        }

        .score-label {
            color: white;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .score-value {
            color: white;
            font-size: 22px;
            font-weight: bold;
            white-space: nowrap;
        }

        .joker-btn {
            background: linear-gradient(145deg, #fbbf24, #f59e0b);
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .joker-btn:hover:not(.disabled) {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.4);
        }

        .joker-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .timer-bar {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            height: 8px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .timer-fill {
            background: linear-gradient(90deg, #10b981, #fbbf24, #ef4444);
            width: 100%;
            height: 100%;
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        .timer-text {
            text-align: center;
            color: white;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
        }

        .question-container {
            background: linear-gradient(145deg, #1e1b4b 0%, #312e81 100%);
            border: 4px solid #7c3aed;
            border-radius: 25px;
            padding: 25px 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .question-header {
            background: #7c3aed;
            color: white;
            padding: 10px 25px;
            border-radius: 40px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 25px;
            display: table;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            letter-spacing: 2px;
        }

        .question-text {
            color: white;
            font-size: 20px;
            text-align: center;
            line-height: 1.45;
            margin: 20px 0;
            font-weight: 500;
            word-wrap: break-word;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .answer-btn {
            background: linear-gradient(145deg, #1e1b4b 0%, #312e81 100%);
            border: 2px solid #7c3aed;
            border-radius: 15px;
            padding: 15px 12px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            text-align: left;
        }

        .answer-btn:hover:not(:disabled) {
            transform: translateX(5px);
            border-color: #a78bfa;
        }

        .answer-label {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: #7c3aed;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .answer-text {
            margin-left: 48px;
            color: white;
        }

        .answer-btn.correct {
            background: linear-gradient(145deg, #065f46 0%, #059669 100%);
            border-color: #10b981;
        }

        .answer-btn.wrong {
            background: linear-gradient(145deg, #7f1d1d 0%, #dc2626 100%);
            border-color: #ef4444;
        }

        .answer-btn.hidden {
            display: none;
        }

        .answer-btn:disabled {
            cursor: default;
            opacity: 0.9;
        }

        .result-message {
            text-align: center;
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
        }

        .next-btn {
            background: linear-gradient(145deg, #7c3aed 0%, #6d28d9 100%);
            border: none;
            border-radius: 12px;
            padding: 12px 35px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: block;
            margin: 20px auto 0;
            transition: 0.2s;
        }

        .next-btn:hover {
            transform: scale(1.02);
        }

        .game-over {
            background: linear-gradient(145deg, #1e1b4b 0%, #312e81 100%);
            border: 4px solid #7c3aed;
            border-radius: 25px;
            padding: 35px 25px;
            text-align: center;
        }

        .game-over h2 {
            color: #a78bfa;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .final-score {
            color: white;
            font-size: 22px;
            margin: 15px 0;
        }

        .restart-btn {
            background: linear-gradient(145deg, #7c3aed 0%, #6d28d9 100%);
            border: none;
            border-radius: 12px;
            padding: 12px 35px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }

        .restart-btn:hover {
            transform: scale(1.02);
        }

        .offline-badge {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            color: #fbbf24;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 100;
        }

        @media (max-width: 600px) {
            .answers-grid { grid-template-columns: 1fr; }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function shuffleAnswers(question) {
        const answers = [...question.a];
        const correctAnswer = question.a[question.c];
        const shuffled = shuffleArray([...answers]);
        const newCorrectIndex = shuffled.indexOf(correctAnswer);
        return { answers: shuffled, correct: newCorrectIndex };
    }

        if (!soundEnabled) return;
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            if (type === 'correct') {
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.25;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.4);
                oscillator.stop(audioCtx.currentTime + 0.4);
            } else {
                oscillator.frequency.value = 440;
                gainNode.gain.value = 0.25;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        } catch(e) { console.log("Ses hatası", e); }

    function startGame() {
        questions = rawQuestions.map(q => {
            const shuffled = shuffleAnswers(q);

                question: q.q,
                answers: shuffled.answers,
                correct: shuffled.correct
            };
        });

        gameActive = true;
        if (timer) clearInterval(timer);
        renderGame();
    }
    
    function stopTimer() { if (timer) { clearInterval(timer); timer = null; } }
    
    function startTimer() {
        timeLeft = 60;
        updateTimerUI();
        stopTimer();
        timer = setInterval(() => {
            if (!gameActive) return;
            if (timeLeft <= 0 && !answered) { clearInterval(timer); timer = null; timeOutNoAnswer(); }
            else if (timeLeft > 0) { timeLeft--; updateTimerUI(); }
        }, 1000);
    }
    
    function updateTimerUI() {
        const fill = document.getElementById('timerFill');
        const txt = document.getElementById('timerText');
        if (fill) fill.style.width = `${(timeLeft/60)*100}%`;
        if (txt) txt.innerHTML = `<span class="icon-timer"><div class="circle"></div><div class="hand"></div><div class="dot"></div></span> ${timeLeft} ${t('seconds')}`;
    }
    
    function useJoker() {
        if (jokerUsed || answered) return;
        jokerUsed = true;
        const jokerBtn = document.getElementById('jokerBtn');
        if (jokerBtn) jokerBtn.classList.add('disabled');
        
        const q = questions[currentIndex];
        const wrongIndices = [];
        for (let i = 0; i < q.answers.length; i++) {
            if (i !== q.correct) wrongIndices.push(i);
        }
        const toRemove = [];
        while (toRemove.length < 2 && wrongIndices.length > 0) {
            const rand = Math.floor(Math.random() * wrongIndices.length);
            toRemove.push(wrongIndices[rand]);
            wrongIndices.splice(rand, 1);
        }
        const btns = document.querySelectorAll('.answer-btn');
        btns.forEach((btn, idx) => {
            if (toRemove.includes(idx)) {
                btn.classList.add('hidden');
            }
        });
    }
    
    function timeOutNoAnswer() {
        if (answered) return;
        answered = true;
        wrong++;
        updateScores();
        const msgDiv = document.getElementById('resultMessage');
        if (msgDiv) msgDiv.innerHTML = `<span class="icon-cross"></span><span>${t('timeUp')}</span>`;
        const btns = document.querySelectorAll('.answer-btn');

            btn.disabled = true; 
            btn.classList.remove('hidden');
            if (i === questions[currentIndex].correct) btn.classList.add('correct'); 
        });
        setTimeout(() => {
            if (currentIndex + 1 < questions.length) {
                const cont = document.querySelector('.question-container');
                if (cont && !document.querySelector('.next-btn')) {
                    let next = document.createElement('button');

                    next.onclick = () => { currentIndex++; renderGame(); };
                    cont.appendChild(next);
                }
            } else showGameOver();
        }, 800);
    }
    
    function renderGame() {

        answered = true; gameActive = false; stopTimer(); vibrate();
        const q = questions[currentIndex];
        const btns = document.querySelectorAll('.answer-btn');
        const msgDiv = document.getElementById('resultMessage');
        
        btns.forEach(b => { b.disabled = true; b.classList.remove('hidden'); });
        
        if (selected === q.correct) { 
            btns[selected].classList.add('correct'); 
            correct++; 
            msgDiv.innerHTML = `<span class="icon-check"></span><span>${t('correctAnswer')}</span>`;
            playSound('correct');
        } else { 
            btns[selected].classList.add('wrong'); 
            btns[q.correct].classList.add('correct'); 
            wrong++; 
            msgDiv.innerHTML = `<span class="icon-cross"></span><span>${t('wrongAnswer')}</span>`;
            playSound('wrong');
        }
        updateScores();
        
        setTimeout(() => {
            if (currentIndex + 1 < questions.length) {
                const cont = document.querySelector('.question-container');
                if (cont && !document.querySelector('.next-btn')) {
                    let next = document.createElement('button');
                    next.className = 'next-btn';
                    next.innerText = t('next');
                    next.onclick = () => { currentIndex++; renderGame(); };
                    cont.appendChild(next);
                }
            } else showGameOver();
        }, 800);
    }
    
    function updateScores() {
        const qn = document.getElementById('qNum'); if (qn) qn.innerText = `${currentIndex+1}/${questions.length}`;
        const cv = document.getElementById('correctVal'); if (cv) cv.innerText = correct;
        const wv = document.getElementById('wrongVal'); if (wv) wv.innerText = wrong;
    }
    
    function showGameOver() {
        stopTimer(); gameActive = false;
        const percent = Math.round((correct/questions.length)*100);
        let msg;
        if (percent >= 80) msg = t('perfect');
        else if (percent >= 60) msg = t('veryGood');
        else if (percent >= 40) msg = t('notBad');
        else msg = t('keepPracticing');
        
        app.innerHTML = `
            <div class="game-over">
                <div class="icon-trophy">
                    <div class="cup-body"></div>
                    <div class="cup-handle"></div>
                    <div class="cup-base"></div>
                    <div class="star"></div>
                </div>
                <h2>${t('gameOver')}</h2>
                <div class="final-score">${t('correct')}: ${correct}</div>
                <div class="final-score">${t('wrong')}: ${wrong}</div>
                <div class="final-score">${t('score')}: %${percent}</div>
                <div style="font-size:28px; margin:20px 0; color:#a78bfa; font-weight:bold;">${msg}</div>
                <button class="restart-btn" id="menuBtn">${t('mainMenu')}</button>
            </div>
        `;
        document.getElementById('menuBtn').onclick = renderMenu;
    }
    
    // Service Worker
    if ('serviceWorker' in navigator) {
        const swCode = `const CACHE_NAME = 'wisdom-quiz-v1';
const urlsToCache = ['/', '/index.html', '/yangin-yeri.mp3'];
self.addEventListener('install', event => {
    event.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache)));
    self.skipWaiting();
});
self.addEventListener('fetch', event => {
    event.respondWith(
        caches.match(event.request).then(response => response || fetch(event.request))
    );
});`;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).then(() => {
            console.log('Service Worker registered');
            document.getElementById('offlineBadge').style.display = 'block';
        }).catch(err => console.log('SW error:', err));
    }
    
    renderMenu();
</script>
</body>
</html>
